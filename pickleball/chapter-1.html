<script id="md" type="text/plain">## Chapter 1 — Slam the Door

I know you’ve slammed a door at least once in your life, Pemberton. You’ve also danced along with a song, and when someone told you to put your hands in the air, you put your hands in the air. In fact, why don’t you do those things right now? Not at the same time. Unless you can, in which case, blow my mind.

Wow. That was **awesome** Pemberton. Truly amazing. Even if you only did it in your mind. 

And guess what? You didn’t have to read a book to do that. It also didn’t matter if you were strong, young, fast, green, or if it was Tuesday. Pickleball is a strange mix of slamming a door and throwing your hands in the air. Which means that you already know how to do it. But it turns out when you throw your hands up in the air like you just don’t care, you’ll be having the best time of all. 

The first thing you need to slam the door on in your mind is the idea that you’re going to win every point. You’re going to hit every shot, you’re going to be Bert, you’re going to win the Chunky Pickle, and that you’ll make every day be Friday. Pickleball is a journey, a fantastic journey through failure. Just the right amount. You’re going to taste success. You’re going to taste failure. You’re going to experience heartbreak. At some point, you will play a game, and the final score will be 11 to 0. 

You’re going to be the zero. 

At some point, you’re going to play with someone who takes themselves way too seriously. You’re going to play with someone who says all your balls are out, and that all of theirs are in. 

You’re going to be moving your feet too much. Then you’re not going to be moving them enough.

And here’s the turn, Pemberton — the one I’d circle in red if this were that kind of book: none of that is the bad part. The zero. The person who calls all your balls out. The feet that won’t behave. That isn’t the *price* of pickleball. That *is* pickleball. Every single one of those things is a thing you *noticed* — and the noticing is the whole game.

Because here is the secret nobody prints on the box: pickleball is not, mostly, played with a paddle. It’s played with your *attention.* You’re going to notice things about yourself you have spent an entire life not noticing. Which foot your weight is on. The exact half-second before your opponent’s paddle moves, when you somehow *know* where the ball is going — and you’ll be wrong, and wrong again, and then one ordinary Thursday you’ll be right, and it will feel like a magic trick you pulled on yourself. You are going to think about your hips and your knees and your feet in ways you have never once thought about them in your whole life of *having* hips and knees and feet.

And underneath all of it, a hundred times a minute, a small voice rolls a die. *Go for it? Let it bounce? Hard? Soft? His backhand? Wait?* You’ve already met the two doing the arguing — Erne wants the winner, Bert wants the next shot — and you will hear them on every ball you ever hit. The entire sport, top to bottom, is just getting a little bit better at that one quiet roll of the die.

Here’s the part I can’t prove to you yet; you’ll have to take it on loan and pay me back later, in noticing. Slowly — so slowly you won’t catch the day it happens — you stop being someone who *plays* pickleball and become someone who gets to *watch* themselves play it. Kindly. From a step or two behind your own head. That’s the prize, Pemberton. Not the Chunky Pickle. The watching.

You don’t have to be strong. You don’t have to be young, or fast, or green, and it does not have to be Friday. You only have to be willing to pay attention — to a small holed-out plastic ball, to the strange unused machinery of a body you’ve been ignoring for years, and to the two foxes hollering from the cheap seats of your skull.

So slam the door on being perfect. Throw your hands in the air like you just don’t care. And then — pay attention. That’s the whole sport. Everything after this is just me, and the foxes, filling in the *how.*</script>
