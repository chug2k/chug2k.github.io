<script id="md" type="text/plain">## A foreword, which is mostly Charles

There's a sport.

You hit a plastic ball — a hollow little planet, completely full of holes — with a paddle, over a low net, into a kitchen you are not allowed to cook in. When you hit it right it makes a sound like a tiny door being slammed by a tiny, satisfied man.

That's the whole sport. You basically know it already.

> **A DIGRESSION, COURTESY OF THE AUTHOR.** Charles wrote this. Charles spent ten years teaching people to write code, and then one ordinary afternoon he set down the keyboard, picked up a paddle, and became, essentially, this. He can't help seeing the sport as a programming language. *Tennis is C,* he'll tell you — magnificent, foundational, and it makes you weep for two years before it lets you have any fun. *Pickleball is Ruby* — built on purpose to make a human being happy inside the first hour. Forgiving. Joyful. Secretly deep. (Squash, he adds, is assembly. Don't ask.) Charles could go on. Charles will not go on. We have taken the keyboard away from Charles. We will not mention Ruby again.

We mean that. We won't.

> **WHAT IS THE CHUNKY PICKLE?** No. We're not explaining the Chunky Pickle. The Chunky Pickle is earned, not described. The patient get it. The impatient don't. You'll know when you have it, and you won't have it for a while. That's all anyone can responsibly say.

This book teaches you the game from the inside out — literally an RPO teaching method, *kitchen-out* — starting at the most important seven feet of the court and working backward. We'll go slowly. There's no other way I'd go.

You get two guides. They're foxes. I don't know why they're foxes. I asked them and they said nothing, on account of being foxes.

![Bert says "low and slow." Erne says "BUT WHERE IS MY CHUNKY PICKLE??"](images/foxes-strip.png)

**Bert** is the calm one in the visor. Bert has, somehow, the inner life of a tortoise, which is a peculiar thing for a fox to have, and yet. Bert dinks. Bert waits. Bert has never once lost his temper and has, as a direct result, won everything. Two words: *low and slow.* He says it so often you'll catch yourself saying it in the shower.

**Erne** is the other one. Erne has had several coffees. Erne wants to hit the ball as hard as a ball can be hit, every time, forever. Erne goes for the winner. Erne loses the point. Erne has never been awarded the Chunky Pickle and we've stopped promising him he will be.

When you want to do something flashy — that's Erne. When you don't — that's Bert. The whole game is the argument between those two. So, I suspect, is most of everything. But we said we'd go slow.

> **A NOTE ON THE PICTURES, AND AN APOLOGY.** You'll notice, as you go, that Bert and Erne do not look *exactly* the same from drawing to drawing. A whisker here, a stray spike there, the occasional surplus paddle. We're sorry. We also want to be clear these are not mistakes: our illustrator works by reaching through a small hole into a **neighbouring dimension** and sketching whatever Bert and Erne happen to be doing *over there* — and the foxes of the adjacent realities are, frankly, a little careless about their own continuity. It is the same two foxes. They are merely multiversal. It's fine. Everyone involved has made their peace with it.

One more thing, and then we start. I'm going to call you **Pemberton.** I have to call you *something* — the second person gets lonely after a while — and you didn't leave a name. And, Pemberton, between us, before we go any further: I'm not completely sure I'm the right person to be teaching you this. The pickleball part I'd stake my life on. The rest of it — the foxes, the dimension, whatever's happening with the pickle — I'm holding together with both hands. But you're here, and the foxes are here, and it would be rude to stop now.

Low and slow, Pemberton. Here we go.</script>
