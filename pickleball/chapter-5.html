<script id="md" type="text/plain">## Chapter 5 — Footwork, the quiet thing that's actually the whole thing

<div class="rung"><svg class="lad" viewBox="0 0 16 20" aria-hidden="true"><line x1="4" y1="2" x2="4" y2="18"/><line x1="12" y1="2" x2="12" y2="18"/><line x1="4" y1="5" x2="12" y2="5"/><line x1="4" y1="9" x2="12" y2="9"/><line x1="4" y1="13" x2="12" y2="13"/><line x1="4" y1="17" x2="12" y2="17"/><line class="on" x1="4" y1="9" x2="12" y2="9"/></svg> on the ladder — <strong>court position</strong>, the 2nd rung</div>

Nobody comes to pickleball to learn footwork. People come to hit the ball. I understand. I'm not thrilled about it either.

But here's something true and a little rude: **you don't hit the ball with your arms. You hit it with your feet.**

Your feet. Not your arms. Your feet.

I'm sorry. I know you bought a paddle and not a pair of shoes. I know this is not what either of us wanted from a chapter. But the arms are only the last little part — the shot was already won or lost half a second earlier, by whether your feet got you somewhere balanced before the ball arrived.

There are really only three things to learn here. And then a fourth, which turns out to be the whole point.

### One: be Erne (for now)

Most beginners have *dead* feet. Planted. Lazy. Flat on the heels, watching the ball go by like it's someone else's problem. So the first thing — and I cannot believe I'm about to say this — is to become the exact opposite. Get **hyperactive.** Bounce. Stay up on the **balls of your feet,** never back on your heels. Take constant little adjustment steps. Be twitchy. Be busy. Be, God help us, a bit of an Erne.

![Erne, all hyperactive energy, lunging and toppling while Bert stays in his tidy base](images/footwork.png)

> **ERNE, from the margin:** *i'm not falling, i'm* attacking *the floor*

I know how this sounds. The whole book has been begging you to be Bert, and now I'm telling you to be Erne. But here's the thing nobody admits: sometimes the fastest road to a Chunky Pickle runs straight through whatever the *opposite* of a Chunky Pickle is. You cannot calm down a pair of feet that never learned to move in the first place. So first you teach them to move — too much, even — and *then* you teach them to settle.

Because your feet go on a little journey, in three acts:

![Erne's feet in three stages: a frozen statue, then a frantic over-busy blur, then calm and balanced](images/feet-journey.png)

They start **inactive** — the statue. You crank them all the way to **overactive** — the twitch, the fidget, the never-quite-still. And then, once they've learned they're *allowed* to move, they finally settle into **normal:** quiet, efficient, the right number of steps and not one more. Inactive, then overactive, then normal. You overshoot to find the middle, and you don't get to skip the overshoot — the calm, economical feet that win games are built on top of the twitchy ones, never instead of them.

(And once you reach *normal,* believe it: the court is small, and nearly everyone moves too much, not too little. The right number of steps is fewer than you'd guess. You have more time than you think — I told you that on the very first page. It was a footwork cue all along.)

### Two: it's all about stability

Once your feet can move, the goal flips completely. Now everything — *everything* — is about **stability.** A pickleball shot comes off a stable base, or it comes off badly. There is no third option. You will never hit a good ball while falling over, and Erne has devoted his whole career to proving it.

Stability has a home, and it's called **ready position.** Live there.

![Bert demonstrating a low, balanced, textbook ready position](images/ready-position.png)

It looks like this. Feet a little wider than your shoulders, toes turned slightly out. Knees bent. Weight forward, on the balls of your feet — *nose over toes.* Paddle up in front of you at about waist height — **not** up by your face, because from up high you can only swing *down,* and good pickleball is hit *up.* Hold it leaning a touch toward your backhand, since that's the side you can't reach across to in time. And tuck your elbows in against your body instead of poking them out front — tucked-in arms rotate faster and tire slower, like a figure skater pulling her arms in to spin. Put it together and you look like you're politely waiting to be handed something heavy. That's the position the entire sport is played from.

Stability is also a rule about *when* you hit: **set your feet, then swing.** Stop moving, plant, *then* strike. A ball hit while you're still drifting is a coin flip. Bert is never moving at the moment he makes contact — that's not a quirk, it's the whole trick. Move, arrive, set, hit, in that order, every time.

### Three: the split step

The last piece is a tiny hop with a silly name. Just as your opponent is about to strike the ball, you give a small **split step** — a little hop that lands you light on both feet, knees soft, *exactly* as they make contact. Land too early and you're already coming down flat and rooted; land too late and you can't change direction. But land it right and, for one instant, you're balanced and loaded and able to push off in any direction at all.

Small hop at the kitchen line, bigger one when you're scrambling deep. Every decent player does it before every single shot, and you will never once catch them at it. That invisibility is the point — it's the secret handshake of people who are quietly better than you.

And one free habit to bolt on: after every shot, **recover** — drift back toward the middle. The ball you didn't expect is always heading for the space you just left.

### And then, the actual point

There's more — open stances and closed stances, crossover steps, the little step *back* that lets a high ball rise to where it's easy. You'll pick all of it up by playing, so don't drown in it now. Because footwork has exactly one job, and it is not to look good:

**Footwork exists to put you in the right place, balanced, before the ball gets there.** That's the whole assignment. Everything above is just a way of doing that one thing.

And being in the right place turns out to be most of the entire sport. Remember the Ladder from a few pages ago — the one where "how pretty your swing is" finished dead last? Its top two rungs are **anticipation** (reading where the ball is going before it goes there) and **court position** (being there, balanced, when it arrives). Footwork is rung two made flesh, and it's how you cash in rung one besides. A player who reads the ball early and whose feet quietly get them set in the right spot will take apart a gorgeous athlete who does neither — every time, forever.

We'll come back to this. We are going to keep coming back to this. Anticipation and position are the closest thing this book has to a religion, and your unglamorous little feet are how you pray.

![Erne frozen mid-swing like a statue, feet planted and set; Bert calm beside him](images/drill-freeze.png)

> ### 🥒 DRILL: Freeze
> Dink or play points, with one rule: **the instant before you hit any ball, you must be fully stopped, balanced, feet set.** Still moving at contact? You don't get to hit it — let it go, concede the rally. Brutal for a day. Then your feet start arriving *early,* on their own, because they've learned that late feet mean no fun. The whole drill teaches your legs to beat the ball to the spot.</script>
