![he is the dot in the wrong place. he is always the dot in the wrong place.](images/strip-which-dot.png)

Three of them loafing at the back. And **one lonely soul already up at the net** — the returner's partner. Why does *he* get to be up there?

Because nobody can stop him. He's not returning the serve and not on the serving team, so the two-bounce thing never traps him — first ball he's allowed to touch, he's allowed to volley. So he strolls up to the best seat in the house, the kitchen line, and sits down.

The whole opening of every point is the other three trying to get up there too, and the rules deciding who's allowed, and when. That's the secret choreography. You'll see it now. You won't be able to stop seeing it.

You'll see it at dinner parties. In traffic. In meetings. One person already at the front, three people waiting for a permission the universe quietly handed out at birth —

— okay. That's enough of that. Look at the net. The net is fine.</script>
