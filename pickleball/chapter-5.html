<script id="md" type="text/plain">## Chapter 5 — Footwork, the quiet thing that's actually the whole thing

Nobody comes to pickleball to learn footwork. People come to hit the ball. I understand. I'm not thrilled about it either.

But here's something true and a little rude: **you don't hit the ball with your arms. You hit it with your feet.**

Your feet. Not your arms. Your feet.

I'm sorry. I know you bought a paddle and not a pair of shoes. I know this is not what either of us wanted from a chapter. But the arms are only the last little part — the shot was already won or lost half a second earlier, by whether your feet got you to a balanced, boring, beautiful little base behind the ball.

That base has a name: **ready position.** Live there.

![Bert demonstrating a textbook low, balanced ready position](images/ready-position.png)

> **WHAT READY POSITION ACTUALLY LOOKS LIKE** (the course is fussy about this, and right to be): feet a little **wider than your shoulders,** toes turned slightly out, knees bent, weight forward on the **balls of your feet** — *"nose over toes."* Paddle up in front at about **waist / net height** — and held a touch toward your **backhand side** (about *11 o'clock* for a righty), because the backhand is the side you can't reach across to in time. Elbows **tucked in** against your body. You look like you're about to be handed something heavy.

Two things everybody does wrong, both worth un-learning today:

> **THE TWO BIGGEST MYTHS, per the videos.** (1) **Paddle held up by your face.** Feels alert. Ruins you — from up high you can only swing *down,* so you open the face and float helium balloons. Start the paddle **low** so you can swing *up.* (2) **Elbows stuck out in front.** Feels athletic. Costs you everything — extended arms rotate slowly, can't load power, and tire fast. **Tucked** elbows spin faster, like a figure skater pulling her arms in. The course flatly calls extended elbows *"the biggest myth in pickleball."*

![Erne lunges off-balance and topples while Bert stays in his tidy base](images/footwork.png)

> **ERNE, from the margin:** *i'm not falling, i'm* attacking *the floor*

Now the moving parts. Three rules and you're most of the way there:

1. **Move your feet to the ball.** Don't reach. Reaching is your feet being lazy and making your arm apologize for it.
2. **Set your feet, then hit.** Stop, *then* swing. A ball hit while you're still drifting is a coin flip. Bert is never moving when he hits. That isn't a coincidence. That's the whole trick.
3. **Recover.** After every shot, push back to ready and drift toward the **middle.** The ball you didn't expect is heading for the space you just left.

> **THE SPLIT-STEP — the secret handshake of decent players.** A tiny hop that lands you light on both feet *just* as your opponent contacts the ball — so you're balanced and able to shove off any direction instead of rooted like a mailbox. **Timing is everything:** land as the ball crosses the net / as they hit — too early and you're already coming down flat-footed, too late and you can't change direction. A small hop at the kitchen; a bigger one only when you're scrambling deep.

Here's the part that should comfort you:

> **EFFICIENCY, or: you are moving too much.** The court is small. The single most common footwork error isn't moving too little — it's **moving too much.** Good footwork is the *right* number of steps, not the most steps; sometimes you just lean and reach. Prize **balance over motion.** (The course tells coaches to calm busy players with one line: *you have more time than you think.* Yes. That line. The one on the cover of this book. It was a footwork cue the whole time.)

But you don't get to "the right amount" in a straight line. Your feet take a little journey first:

![Erne's feet in three stages: frozen statue, then a frantic over-busy blur, then calm and balanced](images/feet-journey.png)

> **THE FEET GO ON A JOURNEY, IN THREE ACTS.** Nobody arrives with good feet. Most beginners start **inactive** — planted, lazy, a statue holding a paddle. So a coach does something that looks deranged: they crank you all the way to **overactive,** constant fidgety little steps, never fully still, almost annoying — just to murder the statue. *Then,* once your feet have learned they're allowed to move, you settle back to **normal:** quiet, efficient, the right number and no more. **Inactive → overactive → normal.** You overshoot the correction to find the middle — and the course is blunt that this only works if you quiet the busy feet *early,* before the overactive habit sets like concrete. (Tennis refugees arrive already overactive and get coached the *opposite* way — hushed down — toward the same calm center.)

And one move that feels wrong and is right: when a ball is coming up at you fast and rising, don't backpedal into it — take a **step back,** turn slightly, and let it climb to the top of its bounce where it hangs, slow and easy, and hit it from there.

Which brings us to the most useful thing in this chapter:

> **THE FIVE LIVES OF A BOUNCING BALL.** After it bounces, the ball rises and falls through five heights, and good players choose the one that suits the shot:
> - **Half-volley** — scraped right off the floor, "trapped." Emergencies; holding your ground in the midcourt.
> - **On the rise** — still climbing. Steals time, but it's easy to jam yourself.
> - **Peak** — the top of the bounce, hanging still for an instant. Easiest to time. **Hit your returns here.**
> - **Descent** — just past the top, falling. The most forgiving phase in the sport. **Hit your drops here** — your rising paddle meets the falling ball.
> - **Downfall** — almost a second bounce. Buys you a precious split-second. **Reset your panicked balls here.**
>
> And when you're not sure how far to move: leave yourself **too much** room. Overrunning a ball is worse than coming up a hair short — you can always step *in.*

![Erne frozen mid-swing like a statue, feet set; Bert calm beside him](images/drill-freeze.png)

> ### 🥒 DRILL: Freeze
> Dink or play points, with one rule: **the instant before you hit any ball, you must be fully stopped, balanced, feet set.** Still moving at contact? You don't get to hit it — let it go, concede the rally. Brutal for a day. Then your feet start arriving *early,* on their own, because they've learned that late feet mean no fun. The whole drill teaches your legs to beat the ball to the spot.</script>
