<script id="md" type="text/plain">## Part Four — The Thinking Game

You can hit all five shots now, Pemberton. You can stand in the right place and move your feet. Congratulations: you are officially *mediocre,* which in pickleball is much further along than it sounds.

This is the part where you stop *losing.* Nothing left in this book is about hitting the ball better. It's about the quiet stuff that actually decides who wins — why patience beats power, how to survive a firefight without panicking, how to share a court with a partner and a brain, what gear to buy and what to ignore, and, last of all, how to get out of your own way. The mechanics got you onto the court. This is the game that gets played once you're standing on it.</script>
