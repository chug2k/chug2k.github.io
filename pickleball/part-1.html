<script id="md" type="text/plain">## Part One — Before the Ball

You thought we would start with the rules. You were wrong, Pemberton. And this won't be the first time you'll be wrong — but it's a fine place to begin, because being a little wrong and carrying cheerfully on anyway is the most pickleball thing you will ever do.

We are not starting with the rules. We're starting with the *joy* — and with the strange, true fact that most of this sport happens in your head and your nerve and your feet long before it ever happens on your paddle. So first you'll meet the two voices you'll be playing alongside for the rest of your life.

The written rules can wait. They're in the very next part, and you're allowed to skip them. The joy cannot wait. It never could.

First, we start with Bert and Erne. Wait, no, we start with Pemberton.</script>
