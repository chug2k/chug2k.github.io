<script id="md" type="text/plain">## Chapter 3 — Everybody's standing weird (on purpose)

Because of the Two-Bounce Rule, every point opens with the four players in a slightly lopsided little tableau:

```
                       NET
   ──────────────────────────────────────────
   [ Returner's Partner ]                       ← already up at the kitchen line
   ╌╌╌╌╌╌╌╌╌╌ the kitchen ╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌
                              [ Returner ]       ← back, waiting to return
   [ Server's Partner ]       [ Server ]         ← both back; server about to serve
   ──────────────────────────────────────────
```

Three of them loafing at the back. And **one lonely soul already up at the net** — the returner's partner. Why does *he* get to be up there?

Because nobody can stop him. He's not returning the serve and not on the serving team, so the two-bounce thing never traps him — first ball he's allowed to touch, he's allowed to volley. So he strolls up to the best seat in the house, the kitchen line, and sits down.

The whole opening of every point is the other three trying to get up there too, and the rules deciding who's allowed, and when. That's the secret choreography. You'll see it now. You won't be able to stop seeing it.</script>
