<script id="md" type="text/plain">## Part Two — The Rules, which you are allowed to skip

Okay. It's time.

I have to tell you about the rules. I have been putting this off — you've noticed; you are not a stupid person, Pemberton, whatever your serve will eventually suggest — for four chapters straight. I promised them at the end of the first one and then lied before the second had properly started. I lied again after that. I told you a whole tender story about somebody named Pim rather than do it. And last time I got as far as *clearing my throat and squaring up the paper* before I caught sight of your feet and disappeared for an hour. I am not proud of this. All right — I am a little proud of this. But it stops here.

Because here is the awkward part: we have been standing *in the kitchen* this entire time. I keep saying the word — the kitchen line, out of the kitchen, that small flaming non-volley box by the net — the way you'd keep mentioning a houseguest you somehow never got around to introducing. It has become rude. So. The rules. The real ones. The written ones. The ones somebody actually printed in a book with a serious cover.

If you already know how to play — if you have ever gripped a paddle in anger, if the cry of *zero–zero–two* means anything to you at all — then you have my full blessing to skip the next few chapters and meet me on the far side, where the game gets interesting again and nobody is reciting regulations at you. But if you've never played, or you simply can't bear to leave Bert and Erne performing to an empty court, then stay. Or go do some squats. Maybe both. The universe is full of rules and we are, regrettably, a part of the universe — this dimension, at least. The one with the pickleball in it.

There are only four things the rulebook truly makes you learn: the **kitchen,** the **two-bounce rule,** where everyone **stands,** and the genuinely unhinged **scoring.** Four short chapters. Then we never speak of rules again, and the actual game begins.</script>
