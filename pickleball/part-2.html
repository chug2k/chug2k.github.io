<script id="md" type="text/plain">## Part Two — The Rules, which you are allowed to skip

Pemberton, if you already know how to play, you should skip these next few chapters. But if you've never played — or if you just feel bad for Bert and Erne not having an audience — you should keep reading. Or do some squats. Maybe do both? The universe is full of rules and we are part of the universe. This dimension, at least. The dimension with pickleball.

There are only four things the rulebook truly makes you learn: the **kitchen,** the **two-bounce rule,** where everyone **stands,** and the genuinely unhinged **scoring.** Four short chapters. Then we never speak of rules again, and the actual game begins.</script>
