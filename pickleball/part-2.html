<script id="md" type="text/plain">## Part Two — The Fundamentals

Welcome back, Pemberton. Or just *welcome,* if you skipped Part One — I genuinely won't tell, and neither will Bert, who does not gossip, unlike *some* foxes.

The rulebook is behind us. From here it's the real thing — but we start with the **body:** how to stand, how to move your silly little feet, how to swing the five shots, and how to string them into a point. The boring, beautiful mechanics. Get these into your hands and the *thinking* part — that's Part Three, and that's where pickleball is actually won — will have something to work with. Bert is delighted. Bert is, of course, not showing it.</script>
