<script id="md" type="text/plain">## Chapter 4 — Footwork, the quiet thing that's actually the whole thing

Pemberton.

I was going to get to the rules. This time I genuinely meant it — I'd cleared my throat and squared up the paper and everything. But then I got to thinking about you, back in your kitchen with a ball and the flat of your hand, doing the bounce drill. Did you get the hang of it? Ten palm-up, ten palm-down, ten switching back and forth? I hope you did. I hope you stood there a little longer than the drill asked for, just because it had started to feel good. I think about you more than is strictly normal for a narrator, and I've stopped apologising for it.

So let me make it harder instead, because that turns out to be the quickest way to show you what footwork even is. Try the same drill standing on a **skateboard** — not rolling, just balanced on it on the carpet. Still doable, isn't it? But notice you're suddenly spending half your attention on the board and only the other half on the ball. Now picture that same skateboard with **one wheel missing** — a raccoon worked it loose in the night, for purposes it has declined to share — so the deck tips and pitches with every breath you take. The drill falls apart. Your hands haven't forgotten a thing; the trouble is there's no longer a steady *you* underneath them to work from, and every motion you make is really just a frantic apology for the last thing the board did. And if even that is too gentle for you — fine, show-off — we can always set you on the deck of a small boat, in a large and badly behaved sea, and you can find out for yourself how much soft, accurate pickleball gets played up there.

![look at the state of that skateboard. it was, only this morning, whole — and it had plans.](images/strip-skateboard.png)

**Footwork is about stability.** Your feet are the one thing that can build a small patch of dry ground under you — out on a court that behaves more and more like that one-wheeled skateboard the better your opponent gets. 

We'll start where the trouble starts: with standing still.

### First, be still

Stability is the whole goal, so let's just begin at the goal. Every shot in this sport comes off a base that is briefly, completely still, or it comes off a bad one — a ball struck while you're still sliding sideways is a coin flip wearing the costume of a shot. You will never hit a good ball while falling over, however much of his career Erne devotes to disproving it.

Stillness has an address, and it's called **ready position.** I'd like you to live there.

![Bert calls this "waiting to be handed something heavy." he waits like this in line at the bank.](images/ready-position.png)

It looks like this: feet a touch wider than your shoulders, toes turned slightly out, knees bent, weight forward over the balls of your feet — *nose over toes.* The paddle stays up in front of you at about waist height, and *not* up by your face, because a paddle held high can only travel down, and good pickleball is hit gently *up.* Lean it a little toward your backhand, the side you can't reach across your own body to cover in time. Tuck your elbows in rather than winging them out — arms held close turn quicker and tire slower, the way a skater pulls hers in to spin. Put the whole thing together and you look like someone politely waiting to be handed something heavy. That patient, half-bent, ready-for-anything shape is the posture the entire sport is played from.

![one of them cannot move. the other cannot stop. the entire sport happens in the slim gap between them.](images/strip-david-statue.png)

### Then, get to the ball

So perfect stillness, on its own, is just a handsome way to lose. The other half of footwork — the half that turns a statue back into a player — is being able to *arrive* somewhere on balance, wherever the ball is headed, inside the half-second you're handed to do it. And arriving asks for the one thing a statue will not do: it asks you to move.

And here is the part almost nobody believes until they feel it: you have to move **much less than you think.** The court is almost insultingly small, and nearly everyone on it moves too much, never too little.

Look at the actual ground. The whole court is twenty feet wide and forty-four long; you only defend half of it; and in doubles you split that half with a partner — so your name is really on about ten feet of width. Then it shrinks *again:* as the two of you press up to the kitchen line and squeeze the angles shut, the slice that is genuinely yours collapses to something you can cover with a lean and a single honest step. Up at the line, the patch of the world you are actually responsible for is closer to a ping-pong table than a tennis court. (There is a lob to fret about; we will fret later. The slow, holey ball hands you more time for it than your nerves will admit.) Stay balanced, and you can reach very nearly everything without travelling much of anywhere. You have more time than you think — I said so on the very first page, about the ball, and it turns out I was quietly talking about your feet the whole time.

So here is the practical whole of it — the part you can go and do this very afternoon. **Start at the kitchen line, and trust that you will almost never need more than a single step.** One step left, one step right, one step back — and far more often than any of those, no step at all, just a shift of your weight onto the foot nearest the ball. The coach who taught me this liked to hand a beginner one cruel little rule — *you may take exactly one step in any direction, and not a single one more* — and the beginner would discover, usually with some indignation, that they could still get to very nearly everything. So go and practise exactly that: a ball to your left, a ball to your right, a ball that nudges you back a step (to get *behind* it, mind — not to flee the line; those are two different things), and your only assignment on each one is to arrive *balanced,* and then drift home to your base. Left, right, back, balanced. That is most of footwork. The rest is footnotes.

And now the two halves close on each other into the one rule this whole chapter is really made of: **move to the ball, and then go still to hit it.** Get there busy and early, plant, and only *then* swing — arrive, set, strike, in that order, on every single ball. Watch Bert do it sometime: he is never moving at the instant he makes contact, not once, and it isn't a quirk of his, it's the entire trick lying out in the open where nobody thinks to look. The statue could never get there. Erne gets there and can't stop. You are going to learn to be both, a hundred quiet times a game, until the day it stops feeling like two separate things.

> **A DIGRESSION, ON SHOES.** Since we are all the way down here at floor level: the one equipment opinion in this chapter I will hold with any heat is *don't play in running shoes.* They're built tall and soft to roll you *forwards,* and this is a sideways game on a court that keeps pretending to be the sea, so the first time you lunge for a wide ball they'll roll your ankle for you, free of charge. Tennis shoes are perfect. Basketball shoes are perfect. Anything flat and low and stuck to the floor — just not the running shoes. If you genuinely want names, the three I keep coming back to are **Adidas Barricades, Babolat SFX, Asics Gel-Resolution.** I lean to the heavier, more stable end of the rack, because I am not an especially nimble man and my knees have lately begun sending me letters; the light *speed* shoes are a joy, and I have turned an ankle in them more than once, so I have quietly chosen padding over fun. You may well be nimbler — most people are. But truly, it is not a big deal: court shoes, any of them, and we need never raise the subject again.

Pemberton, a quick word about the little boxes. Every so often — here, and in sections like this one all through the book — I am going to stop talking and hand you one of these, with a pickle stamped on the lid. They are drills. You are under no obligation whatsoever. But I will tell you, in confidence, that the people who actually *do* the things in the boxes are, with a regularity that borders on rude, the very same people quietly dismantling the people who only read them. Here is one worth doing.

> ### 🥒 DRILL: Catch and Toss
> Leave the paddle in the bag. You and a friend face each other across the net, each at your own kitchen line, and you play a game to **three points** — with throws, not shots.
>
> **The rules.** Every throw is **underhand,** and every throw has to land in the kitchen — the seven-foot box on their side; the line counts as in. You lose a point two ways: if your toss lands *outside* the kitchen, or if you fail to get to *their* toss before it bounces a second time. Catching it clean out of the air is allowed, and encouraged — that's a good catch, not a cheat. Inside the rules, you're quietly trying to make them miss: a toss a touch wide, a touch short, a step they didn't want to take.
>
> **Then — and this is the actual drill —** sit with the points you lost. When your throw sailed out of the kitchen, were you *balanced* as you let it go, or already tipping sideways? Was your weight even between your left foot and your right, or dumped onto one of them? Were you in something like the ready position from a few paragraphs up, or had you briefly forgotten you owned feet? And the balls you couldn't get to in time — *why* not? A late start, a wrong first step, a half-second of watching instead of moving? The catching and tossing is only an excuse. The noticing is the drill.</script>
