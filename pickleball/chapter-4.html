<script id="md" type="text/plain">## Chapter 4 — Footwork, the quiet thing that's actually the whole thing

Pemberton.

I was going to get to the rules. This time I genuinely meant it — I'd cleared my throat and squared up the paper and everything. But then I got to thinking about you, back in your kitchen with a ball and the flat of your hand, doing the bounce drill. Did you get the hang of it? Ten palm-up, ten palm-down, ten switching back and forth? I hope you did. I hope you stood there a little longer than the drill asked for, just because it had started to feel good. I think about you more than is strictly normal for a narrator, and I've stopped apologising for it.

Here's something else I think about, with no warning and for no reason I can defend: the ocean. Not the edge of it — the *deep* of it, a few hundred miles out, where the water stops being a colour and becomes a depth, and the nearest solid thing beneath you is a mile straight down and getting no closer. And the big weather out there, the storms that come through in the dark and stand the whole surface of the world up on its hind legs: black walls of water with no shore to break on, a horizon that heaves up to some impossible angle and then drops away beneath itself, a sea that does not know you are on it and would not change its plans if it found out.

Now set a small boat down in that. And put yourself on the deck of the boat, ball and paddle in hand, and try to do your nice little bounce drill. Ten up, ten down. Go on.

You can't. Your hands are fine — they remember the drill perfectly well — but there is no longer a steady *you* for the hands to work from. The deck drops out from under you and then rises up to meet you, and every motion you make is really just a frantic apology for the last thing the floor did. Nothing soft, nothing accurate, can happen on top of that.

And that is the whole problem footwork exists to solve, which is why you're getting it before almost anything else. **Footwork is about stability.** Every good shot in this sport leaves a base that, for one held instant, is as still and certain as dry land — and your feet are the only thing in the world that can build that little square of dry land beneath you, out on a court that, the better your opponent gets, behaves more and more like that open sea. Ben Johns himself — the best ever to play it, a man who essentially does not miss — would shank the ball clean off the deck of that boat, and look every bit as ridiculous doing it as you or I would. His gift was never really in his hands. His gift is that he is almost never on the boat: at the precise instant the ball arrives, he has found, somehow, a patch of land to stand on.

So that's the work ahead of us — building the land. It comes in a few pieces, and then a last one that turns out to be the thing all the others were for. We'll start where the trouble starts: with standing still.

### First, be still

Stability is the whole goal, so let's just begin at the goal. Every shot in this sport comes off a base that is briefly, completely still, or it comes off a bad one — a ball struck while you're still sliding sideways is a coin flip wearing the costume of a shot. You will never hit a good ball while falling over, however much of his career Erne devotes to disproving it.

Stillness has an address, and it's called **ready position.** I'd like you to live there.

![Bert calls this "waiting to be handed something heavy." he waits like this in line at the bank.](images/ready-position.png)

It looks like this: feet a touch wider than your shoulders, toes turned slightly out, knees bent, weight forward over the balls of your feet — *nose over toes.* The paddle stays up in front of you at about waist height, and *not* up by your face, because a paddle held high can only travel down, and good pickleball is hit gently *up.* Lean it a little toward your backhand, the side you can't reach across your own body to cover in time. Tuck your elbows in rather than winging them out — arms held close turn quicker and tire slower, the way a skater pulls hers in to spin. Put the whole thing together and you look like someone politely waiting to be handed something heavy. That patient, half-bent, ready-for-anything shape is the posture the entire sport is played from.

And here is the catch, which is the best part of the whole business. The most stable object in any room is a statue. A statue never wobbles, never shanks a ball off a pitching deck, never once gets caught leaning the wrong way. A statue is also going to lose every point it ever plays, because for all its magnificent stillness it cannot, to save its marble life, get to the ball.

![one of them cannot move. the other cannot stop. the entire sport happens in the slim gap between them.](images/strip-david-statue.png)

### Then, get to the ball

So perfect stillness, on its own, is just a handsome way to lose. The other half of footwork — the half that turns a statue back into a player — is being able to *arrive* somewhere on balance, wherever the ball is headed, inside the half-second you're handed to do it. And arriving asks for the one thing a statue will not do: it asks you to move.

Most beginners turn up with dead feet — planted, flat on the heels, watching the ball travel past as though it were someone else's problem. They are, to put it plainly, statues; magnificent and doomed. So here comes the strangest request in the whole book, arriving as it does after three chapters of nudging you toward calm: for a little while, stop being Bert. Be Erne. Get up onto the balls of your feet and stay there, bounce, fidget, take small and constant and faintly ridiculous adjustment steps that go nowhere in particular. Be busy, be twitchy, be — heaven help us both — a little unwell about it.

![we asked him to be hyperactive. we did not specify a direction.](images/strip-attacking-floor.png)

You can't quiet a pair of feet that never learned to move in the first place; there's nothing there yet to quiet. So they have to go on a small journey, and they have to take it in order:

![the only known footage of Erne's feet learning. we slowed it down. it did not help.](images/feet-journey.png)

They begin **inactive** — the statue again, rooted, heavy on the heels. You crank them all the way over to **overactive** — the jitter, the fidget, the never-quite-still. And then, once they've found out they are *allowed* to move, they settle at last into **normal:** quiet, economical, the right number of steps and not one more. Inactive, then overactive, then normal — and you don't get to skip the middle one. You find the centre of a range by overshooting both of its ends, and there is no version of this where you reach calm feet without having first been, for a week or two, a genuine catastrophe. The economical feet that win games are built on top of the twitchy ones, never instead of them.

There's a mercy waiting at the far end of that road, too. Once you reach *normal,* you'll find the court is small, and that nearly everyone on it moves too much rather than too little. The right number of steps is fewer than you'd ever guess. You have more time than you think — I told you that on the very first page, about the ball, and it turns out I was quietly also talking, the whole time, about your feet.

And now the two halves close on each other into the one rule this whole chapter is really made of: **move to the ball, and then go still to hit it.** Get there busy and early, plant, and only *then* swing — arrive, set, strike, in that order, on every single ball. Watch Bert do it sometime: he is never moving at the instant he makes contact, not once, and it isn't a quirk of his, it's the entire trick lying out in the open where nobody thinks to look. The statue could never get there. Erne gets there and can't stop. You are going to learn to be both, a hundred quiet times a game, until the day it stops feeling like two separate things.

A quick and frankly unimportant digression, since we're all the way down here at floor level: your shoes. There is one rule, and it's the only equipment opinion in this chapter I'll hold with any heat — don't play in **running shoes.** They're built tall and soft to roll you *forwards,* and this is a sideways game on a court that keeps pretending to be the sea, so the first time you lunge for a wide ball they'll roll your ankle for you, free of charge. Tennis shoes are perfect. Basketball shoes are perfect. Anything flat and low and stuck to the floor. Just not the running shoes. If you genuinely want names, here are the three I keep coming back to: **Adidas Barricades, Babolat SFX, Asics Gel-Resolution.** I lean to the heavier, more stable end of the rack, because I am not an especially nimble man and my knees have lately begun sending me letters; the light "speed" shoes are a joy to wear and I have turned an ankle in them more than once, so I've quietly chosen padding over fun. You may well be nimbler — most people are. But truly, it is not a big deal. Court shoes, any of them, and we need never raise the subject again.

### Then, the small hop

The last piece is a little hop with an undignified name. Right as your opponent is about to strike the ball — not before, not after, but *as* — you make a small **split step:** a low hop that lands you light on both feet, knees soft, precisely at the moment of their contact. Land too early and you've already settled, flat and rooted and committed to standing exactly there; land too late and you're caught in the air and can't choose a direction at all. But land it right, and for one suspended instant you are balanced and loaded and free to push off toward anything.

It isn't a pickleball invention, or even a racket-sport one. It's the same coiled, weight-on-both-feet instant a tennis player has before a return, that a goalkeeper has before a penalty, that a boxer has, that a cat has in the half-second before it decides your houseplant has lived long enough. It's just what an animal does when it doesn't yet know which way it will have to go and means to be ready for all of them. A small split at the kitchen line, a larger one when you're scrambling back; every competent player alive does it before every shot, and you will never once catch them at it. That invisibility is the whole point — it's the quiet handshake of people who are better than you and too gracious to bring it up.

Bolt one free habit onto all of it: the moment after you hit, **recover** — drift back toward the middle of your space. The ball you weren't expecting is, with an almost supernatural reliability, already on its way to the exact patch of court you just wandered out of.

### Then, hold the line

Everything up to here has been general — feet that move, feet that go still, the little hop that marries the two. The net adds one twist that belongs to this sport and to no other, and it comes, the way most things do, from the Kitchen.

Out at the kitchen line — which is, by a comfortable margin, the best square of real estate on the whole court — you can't answer a wide ball the way a tennis player would, by charging forward to cut off the angle, because forward is the Kitchen and the Kitchen is lava. (Yes, that's a rule. Yes, I swore I'd never get to the rules. Look away.) So your footwork up here stops being *running* and becomes something smaller and stranger: a little sideways shuffle to get your body behind the ball, and then a *reach.* The Kitchen is a floor and not a ceiling — all ground, no sky — so you plant your feet just behind the line and lean your paddle out over it, as far as your wingspan and your balance can be talked into agreeing. Play as tall as you possibly can. Up here the reach is most of the offence you own, and it costs nothing but nerve.

And here is the single habit that will quietly cost you more points than any shanked swing ever could: **do not back up.** Every cell in a beginner wants to. A ball comes in low and dips toward your shoelaces, and the sensible, decent, deeply human response is to step back, let it bounce, buy yourself a breath. Don't. Retreating tips your weight onto your heels, ruins your angle, and hands the other team a kitchen twice the size to aim into. When a ball dies at your feet, **half-volley** it instead — scoop it off the very short hop, the half-second after it lands, without surrendering an inch — and stay exactly where you are, on the best ground there is.

There is one honest exception, and only one: a step back you *chose,* on purpose, having read a deep floating dink and decided to let it climb to a friendly height so you could attack it. That is strategy, and it's yours to use. What's forbidden is the *flinch* — the step nobody decided to take. Bert gives up the line about twice a year, both times on purpose. Erne surrenders it roughly every fourth ball, and could not, under oath, tell you why.

### And then, the actual point

There's more of this, and you'll gather most of it without trying — open stances and closed ones, the crossover step, the small step *backward* that lets a high ball climb to a height that's pleasant to hit. Don't drown in any of it tonight. Footwork has exactly one job, and looking athletic is nowhere on the list:

**it exists to put you where the ball is going, balanced, before the ball gets there.** That is the whole assignment. Every cue and drill above is only some way of buying that one quiet outcome.

And being where the ball is going turns out to be most of the entire sport — more than the swing, more than power, more than whatever the lean twenty-six-year-old across the net is currently admiring in himself. Two things conspire to get you there. The first is **anticipation:** knowing where the ball is headed before it has even left the other paddle — and that's the very sense you started growing back in your kitchen, bouncing a ball off the flat of your hand and learning, without any words for it, to read the thing. Out here it becomes watching the shoulder, the tilt of the paddle face, the tiny tell that every player gives away and none of them know they're giving — and starting to move *early,* while there's still time to get somewhere calm instead of merely arriving late and out of breath. The second is just **being there:** feet quietly to the spot, body set, before the ball comes down. A player who reads the ball a beat early and whose feet bring them to the place without any fuss will take apart a magnificent athlete who can do neither — and will do it on a Tuesday, in a thin rain, at sixty years of age.

We're going to keep coming back to these two — knowing where, and being there — for the rest of the book. They're as near to a religion as anything in here gets, and your plain, unglamorous, lifelong-ignored feet are how you say the prayers.

![Erne, frozen on command, for the first and only time in recorded history.](images/drill-freeze.png)

> ### 🥒 DRILL: Freeze
> Dink, or play out points, under a single iron rule: **the instant before you strike any ball, you must be completely stopped — balanced, feet set.** Still drifting at contact? Then you don't get to hit it; let it go, hand over the rally. It is honestly miserable for about a day. Then something shifts on its own: your feet begin arriving *early,* without being told to, because they've worked out privately that late feet mean no fun — and feet, it turns out, will do nearly anything for fun. That's the whole secret of the drill. It teaches your legs to beat the ball to the spot.</script>
